<section class="relative w-full h-[calc(100vh-2px)] overflow-hidden glow-header">
  
  <!-- Slider images -->
  <div class="absolute inset-0 z-0">
    <img
      *ngFor="let slide of slides; let i = index"
      [src]="slide.image"
      class="w-full h-full object-cover transition-opacity duration-1000 absolute inset-0"
      [class.opacity-100]="i === currentIndex"
      [class.opacity-0]="i !== currentIndex"
    />
  </div>

<div class="absolute bottom-0 left-0 w-full h-[2px] bg-pink z-50 pointer-events-none"></div>


<div class="absolute bottom-0 left-0 w-full h-20 
            bg-gradient-to-t from-pink to-transparent 
            opacity-40 blur-[40px] pointer-events-none z-50"></div>




  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/20 z-0"></div>

  <!-- Text -->
  <div class="relative z-10 h-full flex flex-col items-start justify-end text-left text-arcticWhite px-6 pb-[15vh]">

    <h1 class="text-[clamp(3rem,10vw,200px)] font-thin mb-4 fade-in">
      FITNESS WORLD
    </h1>

    <p class="text-xl md:text-4xl opacity-80 fade-in-small">
      {{ currentSubtitle }}
    </p>

  </div>
<!-- SLIDER NAVIGATION UI -->
<div 
  class="absolute inset-0 z-10"
  (mouseenter)="startHoverTimer()"
  (mouseleave)="hideControls()"
>

  <!-- Nyilak -->
  <button 
    *ngIf="showControls"
    class="absolute left-6 top-1/2 -translate-y-1/2 w-10 h-10 
           bg-white/10 backdrop-blur-sm 
           text-white flex items-center justify-center rounded-sm 
           transition hover:bg-white/40"
    (click)="prevSlide()"
  >
    ❮
  </button>

  <button 
    *ngIf="showControls"
    class="absolute right-6 top-1/2 -translate-y-1/2 w-10 h-10 
           bg-white/10 backdrop-blur-sm 
           text-white flex items-center justify-center rounded-sm 
           transition hover:bg-white/40"
    (click)="nextSlide()"
  >
    ❯
  </button>

  <!-- Indikátorok -->
  <div 
    *ngIf="showControls"
    class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-3"
  >
    <div 
      *ngFor="let slide of slides; let i = index"
      class="w-3 h-3 rounded-sm backdrop-blur-sm transition 
             cursor-pointer border border-white/30"
      [class.bg-white/60]="i === currentIndex"
      [class.bg-white/20]="i !== currentIndex"
      (click)="goToSlide(i)"
    ></div>
  </div>

</div>

</section>
